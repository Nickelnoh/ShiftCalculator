<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Графики сменности — ООО «ССК «Звезда»</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.SUPABASE_CONFIG = {
            url: "",
            anonKey: "",
            appKey: "shiftmaster-main"
        };
    </script>
</head>
<body>
    <div class="app-shell container-fluid h-100">
        <div class="row g-0 h-100">
            <aside class="col-12 col-lg-4 col-xl-3 sidebar border-end offcanvas-lg offcanvas-start" tabindex="-1" id="mobileSidebar" aria-labelledby="mobileSidebarLabel">
                <div class="offcanvas-header d-lg-none border-bottom">
                    <h5 class="offcanvas-title" id="mobileSidebarLabel">Панель управления</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Закрыть"></button>
                </div>
                <div class="sidebar-inner p-3">
                    <section class="panel-card mb-3">
                        <div class="section-title simple-title">
                            <span>Год</span>
                        </div>
                        <div class="mt-2">
                            <input type="number" id="currentYear" class="form-control" value="2026" min="2000" max="2100" onchange="updateYear(this.value)">
                            <div class="form-hint mt-2">Праздники заданы для 2026 года.</div>
                        </div>
                    </section>

                    <section class="panel-card mb-3">
                        <div class="section-title simple-title">
                            <span>Графики</span>
                            <button class="btn btn-sm btn-primary ms-auto" type="button" onclick="openCreateModal()">
                                <i class="bi bi-plus-lg"></i>
                            </button>
                        </div>
                        <div id="graphsContainer" class="graphs-list mt-3"></div>
                    </section>

                    <section class="panel-card mb-3">
                        <div class="section-title simple-title">
                            <span>Смены</span>
                            <button onclick="addSmena()" class="btn btn-sm btn-outline-primary ms-auto">
                                <i class="bi bi-plus"></i>
                            </button>
                        </div>
                        <div class="form-hint mt-2">Названия можно редактировать прямо в списке.</div>
                        <div id="smenyList" class="mt-3"></div>
                    </section>

                    <section class="panel-card">
                        <div class="section-title simple-title">
                            <span>Отсутствия</span>
                            <button onclick="addAbsenceModal()" class="btn btn-sm btn-outline-danger ms-auto">
                                <i class="bi bi-plus"></i>
                            </button>
                        </div>
                        <div id="absencesList" class="absence-list mt-3"></div>
                    </section>
                </div>
            </aside>

            <main class="col-12 col-lg-8 col-xl-9 main-content d-flex flex-column">
                <div class="topbar border-bottom bg-white">
                    <div class="p-3 d-flex flex-wrap gap-2 align-items-center justify-content-between topbar-inner">
                        <div class="d-flex align-items-center gap-2 topbar-leading">
                            <button class="btn btn-outline-secondary d-lg-none mobile-menu-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar" aria-controls="mobileSidebar" aria-label="Открыть панель управления">
                                <i class="bi bi-list"></i>
                            </button>
                            <div id="activeGraphInfo" class="active-graph-info"></div>
                        </div>
                        <div class="d-flex flex-wrap gap-2 topbar-actions">
                            <div id="storageStatus" class="sync-status sync-status-local" title="Статус хранения данных">Локально</div>
                            <button onclick="calculateAndRender()" class="btn btn-success">
                                <i class="bi bi-calculator me-1"></i> Рассчитать
                            </button>
                            <button onclick="openFullscreen()" class="btn btn-outline-secondary" title="На весь экран">
                                <i class="bi bi-fullscreen me-1"></i> Во весь экран
                            </button>
                        </div>
                    </div>
                </div>

                <div class="main-scroll flex-grow-1 overflow-auto">
                    <div class="p-3">
                        <div id="annualSummary" class="summary-grid mb-3"></div>

                        <div class="legend-bar mb-3">
                            <div class="legend-item"><span class="legend-color legend-work"></span>Работа</div>
                            <div class="legend-item"><span class="legend-color legend-weekend"></span>Выходной</div>
                            <div class="legend-item"><span class="legend-color legend-holiday"></span>Праздник</div>
                            <div class="legend-item"><span class="legend-color legend-vacation"></span>Отпуск</div>
                            <div class="legend-item"><span class="legend-color legend-sick"></span>Больничный</div>
                            <div class="legend-note ms-lg-auto">В ячейке: сверху часы, снизу ночные.</div>
                        </div>

                        <div class="toolbar-schedule mb-3">
                            <button onclick="increaseCellHeight()" class="btn btn-sm btn-outline-secondary" title="Увеличить высоту">
                                <i class="bi bi-arrows-expand-vertical me-1"></i> Выше
                            </button>
                            <button onclick="decreaseCellHeight()" class="btn btn-sm btn-outline-secondary" title="Уменьшить высоту">
                                <i class="bi bi-arrows-compress-vertical me-1"></i> Ниже
                            </button>
                            <span class="small text-muted">Высота ячеек: <span id="cellHeightDisplay">72px</span></span>
                        </div>

                        <div class="table-card">
                            <div id="scheduleTableWrapper" class="schedule-table-wrapper"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Новый график</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Название графика</label>
                        <input type="text" id="newGraphName" class="form-control" placeholder="Напр. Цех №1 или Диспетчерская">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Дата начала цикла смены 1</label>
                        <input type="date" id="newFirstShiftDate" class="form-control">
                    </div>
                    <div class="d-grid gap-2">
                        <button onclick="createGraphWithType('24')" class="btn btn-outline-primary">24 часа · 16/2 → 8/6 → 2 выходных</button>
                        <button onclick="createGraphWithType('12')" class="btn btn-outline-secondary">12 часов · 12/0 → 4/2 → 8/6 → выходной</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="absenceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Добавить отсутствие</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Смена / сотрудник</label>
                        <select id="modalSmena" class="form-select"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Тип</label>
                        <select id="modalType" class="form-select">
                            <option value="Отпуск">Отпуск</option>
                            <option value="Больничный">Больничный</option>
                        </select>
                    </div>
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <label class="form-label">Начало</label>
                            <input type="date" id="modalStart" class="form-control">
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label">Конец</label>
                            <input type="date" id="modalEnd" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button onclick="saveAbsence()" class="btn btn-primary">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="fullscreenModal" tabindex="-1">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header fullscreen-header">
                    <h5 class="modal-title" id="fullscreenTitle">График на весь экран</h5>
                    <div class="d-flex gap-2 align-items-center fullscreen-controls">
                        <span class="text-muted small">Масштаб: <span id="zoomLevel">100</span>%</span>
                        <button onclick="zoomOut()" class="btn btn-sm btn-outline-secondary" title="Уменьшить">
                            <i class="bi bi-zoom-out"></i>
                        </button>
                        <button onclick="zoomReset()" class="btn btn-sm btn-outline-secondary" title="Сброс">
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </button>
                        <button onclick="zoomIn()" class="btn btn-sm btn-outline-secondary" title="Увеличить">
                            <i class="bi bi-zoom-in"></i>
                        </button>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                </div>
                <div class="modal-body fullscreen-body">
                    <div id="fullscreenContainer" class="fullscreen-container">
                        <div id="fullscreenTableWrapper"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
